<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>本文ビューア</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="reader-shell light-theme horizontal-mode">
  <header class="reader-toolbar" role="banner">
    <div class="toolbar-row toolbar-main">
      <a class="back-home" href="index.html">入口</a>
      <div class="chapter-meta">
        <span id="chapter-number" class="chapter-number">--</span>
        <strong id="chapter-title" class="chapter-title">読み込み中</strong>
      </div>
    </div>
    <div class="toolbar-row toolbar-controls" aria-label="表示設定">
      <button id="mode-toggle" class="control-button" type="button">縦書き</button>
      <button id="theme-toggle" class="control-button" type="button">ダーク</button>
      <label class="font-control">
        <span>文字</span>
        <input id="font-size" type="range" min="16" max="28" value="19" step="1">
      </label>
      <select id="chapter-select" class="chapter-select" aria-label="章を選択"></select>
    </div>
  </header>

  <main class="reader-main">
    <div id="article-scroll" class="article-scroll" tabindex="0">
      <article id="novel" class="novel-body" aria-live="polite">
        <p>読み込み中です。</p>
      </article>
    </div>
  </main>

  <nav class="reader-nav" aria-label="前後の章">
    <a id="prev-link" class="nav-link disabled" href="#" aria-disabled="true">前へ</a>
    <a id="next-link" class="nav-link disabled" href="#" aria-disabled="true">次へ</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
